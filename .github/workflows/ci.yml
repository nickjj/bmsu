name: "CI"

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"
      - "master"
  schedule:
    - cron: "30 12 * * *"

jobs:
  test:
    runs-on: "ubuntu-24.04"

    steps:
      - uses: "actions/checkout@v6"

      - name: "Fetch tags (used in tests)"
        run: git fetch --prune --unshallow --tags

      - name: "Linting and formatting"
        run: |
          ./run ci:quality

      - name: "Tests"
        run: |
          ./run ci:test
